name: CI

on:
  push:
    branches:
      - main
      - 'security-*'
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: node_modules/.bin/tsc --noEmit

      - name: Test
        run: npm test
